<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Stripe Merger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }

        canvas {
            border: 1px solid black;
            margin: 20px auto;
        }

        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .drop-zone {
            width: 200px;
            height: 200px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 16px;
            color: #ccc;
            cursor: pointer;
            position: relative;
        }

        .drop-zone.dragover {
            border-color: #333;
            color: #333;
        }

        .drop-zone img {
            max-width: 100%;
            max-height: 100%;
            display: block;
            position: absolute;
            cursor: move;
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        .drop-zone span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <h1>Image Stripe Merger</h1>
    <div class="image-container">
        <div id="dropZoneA" class="drop-zone">
            <span>Click or Drop Image A Here</span>
            <img id="imagePreviewA" src="sample_a.webp" alt="Image A">
            <input type="file" id="inputFileA" accept="image/*">
        </div>
        <div id="dropZoneB" class="drop-zone">
            <span>Click or Drop Image B Here</span>
            <img id="imagePreviewB" src="sample_b.webp" alt="Image B">
            <input type="file" id="inputFileB" accept="image/*">
        </div>
    </div>
    <input type="number" id="stripeCount" placeholder="Stripe Count" value="3">
    <select id="direction">
        <option value="diagonal">Diagonal</option>
        <option value="vertical">Vertical</option>
        <option value="horizontal">Horizontal</option>
    </select>
    <input type="number" id="angle" placeholder="Angle (-90 to 90)" value="45">
    <br>
    <canvas id="canvas" width="800" height="400"></canvas>
    <br>
    <button id="copyButton">Copy to Clipboard</button>
    <button id="downloadButton">Download Image</button>
    <script src="script.js"></script>
</body>

</html>
